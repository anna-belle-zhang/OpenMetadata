version: "3.9"

# Minimal infrastructure for native WSL2 OM development.
# Runs ONLY OpenSearch + Airflow.
# PostgreSQL runs natively in WSL2 (see docs/plans/2026-02-28-openmetadata-local-dev-setup.md).
# OM Java server runs natively in WSL2.

volumes:
  os-data:
  airflow-dag-configs:
  airflow-tmp:

services:

  opensearch:
    image: opensearchproject/opensearch:2.6.0
    container_name: om_opensearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - plugins.security.disabled=true
      - indices.query.bool.max_clause_count=4096
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - os-data:/usr/share/opensearch/data
    healthcheck:
      test: "curl -s http://localhost:9200/_cluster/health | grep -qE 'green|yellow'"
      interval: 15s
      timeout: 10s
      retries: 10

  airflow:
    build:
      context: ../../.
      dockerfile: ingestion/Dockerfile.ci
      args:
        INGESTION_DEPENDENCY: "all"
    container_name: om_airflow
    environment:
      AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__OPENMETADATA_AIRFLOW_APIS__DAG_GENERATED_CONFIGS: "/opt/airflow/dag_generated_configs"
      # Native WSL2 PostgreSQL via host.docker.internal
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      AIRFLOW_DB: airflow_db
      DB_USER: airflow_user
      DB_SCHEME: postgresql+psycopg2
      DB_PASSWORD: airflow_pass
      # Audit pipeline credentials (set via your local .env file)
      ADO_PAT: "${ADO_PAT:-}"
      ADO_ORG_URL: "https://dev.azure.com/abnerzhang"
      ADO_PROJECT: "AzureDataPlatformCICD"
      POSTGRES_HOST: "host.docker.internal"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "audit_db"
      POSTGRES_USER: "airflow_user"
      POSTGRES_PASSWORD: "airflow_pass"
      AIRFLOW_BASE_URL: "http://host.docker.internal:8080"
      AIRFLOW_INSTANCE: "localhost"
      LOOKBACK_DAYS: "7"
    entrypoint: /bin/bash
    command:
      - "-c"
      - "sed -i 's/\\r//' /opt/airflow/ingestion_dependency.sh && bash /opt/airflow/ingestion_dependency.sh"
    ports:
      - "8080:8080"
    volumes:
      - /mnt/e/A/infra-devops/openmetadata/airflow/dags:/opt/airflow/dags
      - airflow-dag-configs:/opt/airflow/dag_generated_configs
      - airflow-tmp:/tmp
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      opensearch:
        condition: service_healthy
